<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}NASA Space Explorer{% endblock %}</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    
    {% block extra_css %}{% endblock %}
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="{{ url_for('main.index') }}">
                <i class="fas fa-rocket me-2"></i>NASA Explorer
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'main.index' %}active{% endif %}" href="{{ url_for('main.index') }}">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'apod.index' %}active{% endif %}" href="{{ url_for('apod.index') }}">APOD</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'mars.index' %}active{% endif %}" href="{{ url_for('mars.index') }}">Mars Rovers</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'asteroids.index' %}active{% endif %}" href="{{ url_for('asteroids.index') }}">Asteroids</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'weather.index' %}active{% endif %}" href="{{ url_for('weather.index') }}">Space Weather</a>
                    </li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'favorites.index' %}active{% endif %}" href="{{ url_for('favorites.index') }}">
                            <i class="fas fa-heart text-danger"></i> Favorites
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'main.about' %}active{% endif %}" href="{{ url_for('main.about') }}">About</a>
                    </li>
                
                </ul>
                <form class="d-flex ms-lg-3 my-2 my-lg-0" action="{{ url_for('search.index') }}" method="GET">
                    <input class="form-control form-control-sm me-2" type="search" name="q" placeholder="Search date/rover..." aria-label="Search" style="background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2);">
                    <button class="btn btn-sm btn-outline-glow" type="submit"><i class="fas fa-search"></i></button>
                </form>
            </div>

        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow-1">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="py-4 mt-5">
        <div class="container text-center">
            <p class="mb-0 text-muted">
                &copy; {{ current_year|default(2024) }} NASA Space Explorer. Powered by <a href="https://api.nasa.gov/" target="_blank" class="text-decoration-none text-accent">NASA Open APIs</a>.
            </p>
        </div>
    </footer>

    <!-- Toast Container -->
    <div id="toast-container" class="toast-container position-fixed bottom-0 end-0 p-3"></div>

    <!-- Bootstrap & JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.css"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
