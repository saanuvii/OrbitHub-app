{% extends 'base.html' %}

{% block title %}404 - Not Found{% endblock %}

{% block content %}
<div class="container py-5 d-flex align-items-center justify-content-center" style="min-height: 70vh;">
    <div class="text-center fade-in">
        <h1 class="display-1 text-primary fw-bold mb-0">404</h1>
        <h2 class="mb-4">Lost in Space</h2>
        <p class="text-muted mb-5 lead">The page you are looking for has drifted into the void.</p>
        <a href="{{ url_for('main.index') }}" class="btn btn-glass px-4 py-2">
            <i class="fas fa-home me-2"></i> Return to Mission Control
        </a>
    </div>
</div>
{% endblock %}
