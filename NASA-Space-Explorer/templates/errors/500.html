{% extends 'base.html' %}

{% block title %}500 - Server Error{% endblock %}

{% block content %}
<div class="container py-5 d-flex align-items-center justify-content-center" style="min-height: 70vh;">
    <div class="text-center fade-in">
        <h1 class="display-1 text-danger fw-bold mb-0">500</h1>
        <h2 class="mb-4">System Malfunction</h2>
        <p class="text-muted mb-5 lead">Our servers encountered an unexpected issue while communicating with NASA APIs.</p>
        <a href="{{ url_for('main.index') }}" class="btn btn-glass px-4 py-2">
            <i class="fas fa-sync-alt me-2"></i> Retry Mission
        </a>
    </div>
</div>
{% endblock %}
