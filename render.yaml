services:
  - type: web
    name: nasa-space-explorer
    env: python
    buildCommand: "cd NASA-Space-Explorer && pip install -r requirements.txt"
    startCommand: "cd NASA-Space-Explorer && gunicorn app:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.1
      - key: NASA_API_KEY
        value: DEMO_KEY
      - key: SECRET_KEY
        generateValue: true
